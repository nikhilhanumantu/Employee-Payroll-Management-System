<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Processing - PayrollPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-wallet"></i> PayrollPro
            </div>
            
            <div class="nav-menu">
                <div class="nav-section-title">Navigation</div>
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="employees.html" class="nav-item">
                    <i class="fas fa-users"></i> Employees
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i> Attendance
                </a>
                <a href="payroll.html" class="nav-item active">
                    <i class="fas fa-file-invoice-dollar"></i> Payroll
                </a>
                <a href="reports.html" class="nav-item admin-only">
                    <i class="fas fa-chart-bar"></i> Reports
                </a>
            </div>

            <div class="sidebar-footer" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <i class="fas fa-bars pointer"></i>
                </div>
                <div class="topbar-right">
                    <div class="notification-container">
                        <div class="notification-icon">
                            <i class="far fa-bell"></i>
                            <span class="notification-dot" style="display: none;"></span>
                        </div>
                        <div class="notifications-dropdown">
                            <div class="notifications-header">
                                <h4 class="font-semibold">Notifications</h4>
                                <a href="javascript:void(0)" onclick="markAllAsRead()" style="font-size: 11px; color: var(--primary-color);">Mark all read</a>
                            </div>
                            <div class="notifications-list">
                                <!-- JS Injected -->
                            </div>
                            <div class="notifications-footer">
                                <a href="javascript:void(0)">System Updates</a>
                            </div>
                        </div>
                    </div>
                    <div class="user-profile flex items-center gap-2" style="margin-left: 1rem;">
                        <div style="text-align: right;">
                            <div class="font-semibold" id="user-welcome">User</div>
                            <div class="text-muted" style="font-size: 11px;" id="user-role">role</div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Payroll Processing</h1>
                        <p class="text-muted">Generate and manage monthly payroll</p>
                    </div>
                    
                </div>

                <div class="card p-0 mb-6">
                    <div class="filter-bar" style="padding: 1.5rem 1.5rem 0 1.5rem;">
                        <div style="display:flex; gap: 1rem; align-items: center; width:100%;">
                            <div style="flex: 1;">
                                <label class="text-muted mb-1" style="display:block; font-size:12px;">Month</label>
                                <select id="filterMonth" class="form-control">
                                    <option value="">All Months</option>
                                    <option value="January">January</option>
                                    <option value="February">February</option>
                                    <option value="March">March</option>
                                    <option value="April">April</option>
                                    <option value="May">May</option>
                                    <option value="June">June</option>
                                    <option value="July">July</option>
                                    <option value="August">August</option>
                                    <option value="September">September</option>
                                    <option value="October">October</option>
                                    <option value="November">November</option>
                                    <option value="December">December</option>
                                </select>
                            </div>
                            <div style="flex: 1; max-width:150px;">
                                <label class="text-muted mb-1" style="display:block; font-size:12px;">Year</label>
                                <select id="filterYear" class="form-control">
                                    <option value="">All Years</option>
                                    <option value="2026">2026</option>
                                    <option value="2025">2025</option>
                                </select>
                            </div>
                            <div style="flex: none; display: flex; align-items: flex-end; padding-top:20px;">
                                <button class="btn btn-outline" onclick="loadPayroll()">Filter</button>
                            </div>
                        </div>
                    </div>

                    <div class="table-container" style="padding: 1rem 0;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Month</th>
                                    <th>Days Worked</th>
                                    <th>Gross</th>
                                    <th>Deductions</th>
                                    <th>Net Salary</th>
                                    <th>Status</th>
                                    <th class="admin-only" style="text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="payroll-table">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="card admin-only">
                   <h2 class="font-semibold mb-4 text-center">Process New Payroll</h2>
                   <form id="processForm" style="max-width: 600px; margin: 0 auto;">
                       <div class="flex gap-4 mb-4">
                            <div style="flex: 1;">
                                <label class="form-label">Employee *</label>
                                <select id="procEmployee" name="employee_id" class="form-control" required></select>
                            </div>
                            <div style="flex: 1;">
                                <label class="form-label">Month *</label>
                                <select id="procMonth" name="month" class="form-control" required></select>
                            </div>
                            <div style="flex: 1; max-width:100px;">
                                <label class="form-label">Year *</label>
                                <input type="number" id="procYear" name="year" class="form-control" value="2026" required>
                            </div>
                       </div>
                       <div class="form-group mb-4">
                           <label class="form-label">Manual Deductions (₹)</label>
                           <input type="number" id="procDeductions" name="manual_deductions" class="form-control" placeholder="0" value="0">
                       </div>
                       <button type="submit" id="processBtn" class="btn btn-primary" style="width: 100%;">
                           <i class="fas fa-play"></i> Process Payroll
                       </button>
                   </form>
                </div>

            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/payroll.js"></script>
</body>
</html>
