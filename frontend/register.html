<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PayrollPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="img/srm_logo.png" alt="SRM Logo" style="max-height: 80px; margin-bottom: 1rem;">
            <h1 class="font-bold" style="font-size: 1.5rem;">PayrollPro</h1>
            <p class="text-muted mt-2">Employee Payroll Management System</p>
        </div>

        <div class="login-box">
            <h2 class="font-semibold mb-1 text-center" style="font-size: 1.25rem;">Create your account</h2>
            <p class="text-muted text-center mb-6">Enter your details to register</p>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="regEmail">Registered Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="email@company.com" required>
                    <small class="text-muted" style="font-size: 0.75rem; display: block; mt-1">Use the email provided by your Admin</small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">New Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label" for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                    Create Account
                </button>
            </form>

            <div class="text-center mt-6 pt-4" style="border-top: 1px solid #e2e8f0;">
                <p class="text-sm text-muted">Already registered? <a href="index.html" class="font-semibold" style="color: var(--primary-color);">Sign In</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
