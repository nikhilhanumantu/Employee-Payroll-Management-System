<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - PayrollPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-wallet"></i> PayrollPro
            </div>
            
            <div class="nav-menu">
                <div class="nav-section-title">Navigation</div>
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="employees.html" class="nav-item active">
                    <i class="fas fa-users"></i> Employees
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-calendar-check"></i> Attendance
                </a>
                <a href="payroll.html" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i> Payroll
                </a>
                <a href="reports.html" class="nav-item admin-only">
                    <i class="fas fa-chart-bar"></i> Reports
                </a>
            </div>

            <div class="sidebar-footer" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <i class="fas fa-bars pointer"></i>
                </div>
                <div class="topbar-right">
                    <div class="notification-icon">
                        <i class="far fa-bell"></i>
                    </div>
                    <div class="user-profile flex items-center gap-2" style="margin-left: 1rem;">
                        <div style="text-align: right;">
                            <div class="font-semibold" id="user-welcome">Admin User</div>
                            <div class="text-muted" style="font-size: 11px;" id="user-role">admin</div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Employees</h1>
                        <p class="text-muted" id="total-employees-text">0 total employees</p>
                    </div>
                    <button class="btn btn-primary admin-only" onclick="openEmployeeModal()">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>

                <div class="filter-bar">
                    <div class="search-input">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name, ID, or email...">
                    </div>
                    <select id="deptFilter" class="form-control" style="width: 200px;">
                        <option value="">All Departments</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                    </select>
                </div>

                <div class="card p-0">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Email</th>
                                    <th>Basic Salary</th>
                                    <th class="admin-only" style="text-align: center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employees-table">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="employeeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="font-semibold" id="modalTitle" style="font-size: 1.25rem;">Add Employee</h2>
                <i class="fas fa-times modal-close pointer"></i>
            </div>
            <form id="employeeForm">
                <div class="form-group">
                    <label class="form-label" for="empId">Employee ID *</label>
                    <input type="text" id="empId" name="id" class="form-control" placeholder="EMP001" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="empName">Full Name *</label>
                    <input type="text" id="empName" name="name" class="form-control" required>
                </div>
                <div class="flex gap-4 mb-4">
                    <div style="flex: 1;">
                        <label class="form-label" for="empDept">Department *</label>
                        <select id="empDept" name="department" class="form-control" required>
                            <option value="Engineering">Engineering</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label class="form-label" for="empDesignation">Designation *</label>
                        <input type="text" id="empDesignation" name="designation" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="empEmail">Email Address *</label>
                    <input type="email" id="empEmail" name="email" class="form-control" required>
                </div>
                <div class="form-group mb-6">
                    <label class="form-label" for="empSalary">Basic Salary * (₹)</label>
                    <input type="number" step="0.01" id="empSalary" name="basic_salary" class="form-control" required>
                </div>
                
                <div class="flex gap-4 justify-between">
                    <button type="button" class="btn btn-outline modal-cancel flex-1" style="flex:1">Cancel</button>
                    <button type="submit" class="btn btn-primary flex-1" style="flex:1" id="saveEmployeeBtn">Save Employee</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/employees.js"></script>
</body>
</html>
